name: Engine Tests

on:
  pull_request:
    paths:
      - "src/Cyberland.Engine/**"
      - "tests/**"
      - "Directory.Build.props"
      - ".github/workflows/engine-tests.yml"
  push:
    branches:
      - master
    paths:
      - "src/Cyberland.Engine/**"
      - "tests/**"
      - "Directory.Build.props"
      - ".github/workflows/engine-tests.yml"
  workflow_dispatch:

jobs:
  test-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore tests/Cyberland.Engine.Tests/Cyberland.Engine.Tests.csproj

      - name: Test with coverage gate
        run: dotnet test tests/Cyberland.Engine.Tests/Cyberland.Engine.Tests.csproj -c Debug /p:CollectCoverage=true --no-restore
