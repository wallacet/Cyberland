name: Mod Projects In Solution

on:
  pull_request:
    paths:
      - "mods/**"
      - "Cyberland.sln"
      - "scripts/assert-mod-projects-in-solution.sh"
      - ".github/workflows/mod-projects-in-solution.yml"
  push:
    branches:
      - master
    paths:
      - "mods/**"
      - "Cyberland.sln"
      - "scripts/assert-mod-projects-in-solution.sh"
      - ".github/workflows/mod-projects-in-solution.yml"
  workflow_dispatch:

jobs:
  verify-mod-project-membership:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Validate all mod csproj files are in solution
        shell: bash
        run: bash ./scripts/assert-mod-projects-in-solution.sh
